// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
const eio = t=>t<.5?2*t*t:-1+(4-2*t)*t;
const lerp = (a,b,t)=>a+(b-a)*t;
function ipos(kfs,t){
  if(!kfs||!kfs.length) return {x:0,y:0};
  if(kfs.length===1) return kfs[0];
  for(let i=0;i<kfs.length-1;i++){
    if(t>=kfs[i].t&&t<=kfs[i+1].t){
      const s=kfs[i+1].t-kfs[i].t; if(!s) return kfs[i+1];
      const p=eio((t-kfs[i].t)/s);
      return {x:lerp(kfs[i].x,kfs[i+1].x,p),y:lerp(kfs[i].y,kfs[i+1].y,p)};
    }
  }
  return kfs[kfs.length-1];
}
const getInitial = fk => FORMATIONS[fk].players.map(p=>({...p}));
const hRgb = h=>{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return `${r},${g},${b}`;};

// ═══════════════════════════════════════════
// FOOTBALL FIELD SVG
// ═══════════════════════════════════════════
function FootballField({fieldStyle}){
  const W=FW,H=FH,sx=W/68,sy=H/105;
  const paw=40.32*sx,pah=16.5*sy,gaw=18.32*sx,gah=5.5*sy;
  const cr=9.15*Math.min(sx,sy),ps=11*sy,cor=1*Math.min(sx,sy);
  const gw=7.32*sx,gd=2.5*sy,lw=1.5;
  const g1=fieldStyle==='night'?'#0b1c12':fieldStyle==='minimal'?'#14201a':'#1b5230';
  const g2=fieldStyle==='night'?'#091609':fieldStyle==='minimal'?'#111c16':'#175028';
  const lc=fieldStyle==='minimal'?'rgba(255,255,255,0.32)':'rgba(255,255,255,0.88)';
  const ns=16,sh=H/ns;
  return(
    <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{display:'block',flexShrink:0}}>
      <defs>
        <clipPath id="iPadTopArc"><rect x={0} y={pah} width={W} height={H-pah}/></clipPath>
        <clipPath id="iPadBotArc"><rect x={0} y={0} width={W} height={H-pah}/></clipPath>
        <filter id="fieldGlow"><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <rect width={W} height={H} fill={g1}/>
      {Array.from({length:ns}).map((_,i)=>i%2===0?<rect key={i} x={0} y={i*sh} width={W} height={sh} fill={g2}/>:null)}
      <rect x={1} y={1} width={W-2} height={H-2} fill="none" stroke={lc} strokeWidth={lw}/>
      <line x1={0} y1={H/2} x2={W} y2={H/2} stroke={lc} strokeWidth={lw}/>
      <circle cx={W/2} cy={H/2} r={cr} fill="none" stroke={lc} strokeWidth={lw}/>
      <circle cx={W/2} cy={H/2} r={3} fill={lc}/>
      <rect x={(W-paw)/2} y={0} width={paw} height={pah} fill="none" stroke={lc} strokeWidth={lw}/>
      <rect x={(W-gaw)/2} y={0} width={gaw} height={gah} fill="none" stroke={lc} strokeWidth={lw}/>
      <circle cx={W/2} cy={ps} r={2.5} fill={lc}/>
      <circle cx={W/2} cy={ps} r={cr} fill="none" stroke={lc} strokeWidth={lw} clipPath="url(#iPadTopArc)"/>
      <rect x={(W-paw)/2} y={H-pah} width={paw} height={pah} fill="none" stroke={lc} strokeWidth={lw}/>
      <rect x={(W-gaw)/2} y={H-gah} width={gaw} height={gah} fill="none" stroke={lc} strokeWidth={lw}/>
      <circle cx={W/2} cy={H-ps} r={2.5} fill={lc}/>
      <circle cx={W/2} cy={H-ps} r={cr} fill="none" stroke={lc} strokeWidth={lw} clipPath="url(#iPadBotArc)"/>
      <path d={`M${cor*3} 0 A${cor*3} ${cor*3} 0 0 1 0 ${cor*3}`} fill="none" stroke={lc} strokeWidth={lw}/>
      <path d={`M${W-cor*3} 0 A${cor*3} ${cor*3} 0 0 0 ${W} ${cor*3}`} fill="none" stroke={lc} strokeWidth={lw}/>
      <path d={`M0 ${H-cor*3} A${cor*3} ${cor*3} 0 0 0 ${cor*3} ${H}`} fill="none" stroke={lc} strokeWidth={lw}/>
      <path d={`M${W} ${H-cor*3} A${cor*3} ${cor*3} 0 0 1 ${W-cor*3} ${H}`} fill="none" stroke={lc} strokeWidth={lw}/>
      <rect x={(W-gw)/2} y={-gd} width={gw} height={gd} fill="rgba(255,255,255,0.05)" stroke={lc} strokeWidth={lw}/>
      <rect x={(W-gw)/2} y={H} width={gw} height={gd} fill="rgba(255,255,255,0.05)" stroke={lc} strokeWidth={lw}/>
    </svg>
  );
}

// ═══════════════════════════════════════════
// FORMATION LINES OVERLAY (SVG)
// ═══════════════════════════════════════════
function FormationLines({players, formation, teamColor, show}){
  if(!show) return null;
  const lines=FORMATIONS[formation]?.lines||[];
  const byId={};
  players.forEach(p=>byId[p.id]=p);
  return(
    <svg style={{position:'absolute',top:0,left:0,width:FW,height:FH,pointerEvents:'none'}} viewBox={`0 0 ${FW} ${FH}`}>
      {lines.map(([a,b],i)=>{
        const pa=byId[a],pb=byId[b];
        if(!pa||!pb) return null;
        return <line key={i} x1={pa.x*FW} y1={pa.y*FH} x2={pb.x*FW} y2={pb.y*FH}
          stroke={`rgba(${hRgb(teamColor)},0.22)`} strokeWidth={1.5} strokeDasharray="4 5"/>;
      })}
    </svg>
  );
}

// ═══════════════════════════════════════════
// TACTIC ANIMATION CANVAS
// ═══════════════════════════════════════════
function TacticCanvas({tactic,animTime,showGhosts,playing}){
  const ref=useRef(null);
  useEffect(()=>{
    const c=ref.current; if(!c) return;
    const dpr=Math.min(window.devicePixelRatio||1,2);
    c.width=FW*dpr; c.height=FH*dpr;
    c.getContext('2d').scale(dpr,dpr);
  },[]);
  useEffect(()=>{
    const c=ref.current; if(!c) return;
    const ctx=c.getContext('2d');
    ctx.clearRect(0,0,FW,FH);
    if(!tactic) return;
    // Ghost lines
    if(showGhosts&&!playing){
      Object.values(tactic.movements).forEach(kfs=>{
        if(kfs.length<=1) return;
        const s=kfs[0],e=kfs[kfs.length-1];
        if(Math.hypot((e.x-s.x)*FW,(e.y-s.y)*FH)<8) return;
        ctx.setLineDash([4,5]); ctx.strokeStyle='rgba(255,200,60,0.38)'; ctx.lineWidth=1.6;
        ctx.beginPath(); ctx.moveTo(s.x*FW,s.y*FH); ctx.lineTo(e.x*FW,e.y*FH); ctx.stroke();
        ctx.setLineDash([]);
        ctx.strokeStyle='rgba(255,200,60,0.28)'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.arc(e.x*FW,e.y*FH,12,0,Math.PI*2); ctx.stroke();
      });
    }
    // Animated trails
    if(playing||animTime>0){
      Object.values(tactic.movements).forEach(kfs=>{
        if(kfs.length<=1) return;
        const pts=kfs.filter(k=>k.t<=animTime+.001).map(k=>({x:k.x*FW,y:k.y*FH}));
        const cur=ipos(kfs,animTime); const cp={x:cur.x*FW,y:cur.y*FH};
        if(pts.length>0&&Math.hypot(cp.x-pts[pts.length-1].x,cp.y-pts[pts.length-1].y)>2) pts.push(cp);
        if(pts.length<2) return;
        ctx.setLineDash([4,4]); ctx.strokeStyle='rgba(255,215,50,0.8)'; ctx.lineWidth=2; ctx.lineCap='round';
        ctx.beginPath(); pts.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y)); ctx.stroke();
        ctx.setLineDash([]);
        if(pts.length>=2){
          const a=pts[pts.length-1],b=pts[pts.length-2];
          if(Math.hypot(a.x-b.x,a.y-b.y)>4){
            const ang=Math.atan2(a.y-b.y,a.x-b.x),sz=9,av=.44;
            ctx.fillStyle='rgba(255,215,50,0.95)';
            ctx.beginPath(); ctx.moveTo(a.x,a.y);
            ctx.lineTo(a.x-sz*Math.cos(ang-av),a.y-sz*Math.sin(ang-av));
            ctx.lineTo(a.x-sz*Math.cos(ang+av),a.y-sz*Math.sin(ang+av));
            ctx.closePath(); ctx.fill();
          }
        }
      });
    }
    // Ball
    if(tactic.ball&&tactic.ball.length){
      const bp=(playing||animTime>0)?ipos(tactic.ball,animTime):(tactic.ballStart||tactic.ball[0]);
      const bx=bp.x*FW,by=bp.y*FH;
      if((playing||animTime>0)&&tactic.ball.length>1){
        const bpts=tactic.ball.filter(b=>b.t<=animTime+.001).map(b=>({x:b.x*FW,y:b.y*FH}));
        if(bpts.length>=2){
          ctx.setLineDash([3,5]); ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1.5;
          ctx.beginPath(); bpts.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
          ctx.lineTo(bx,by); ctx.stroke(); ctx.setLineDash([]);
        }
      }
      ctx.shadowColor='rgba(255,255,200,0.7)'; ctx.shadowBlur=10;
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(bx,by,6.5,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
      ctx.strokeStyle='#333'; ctx.lineWidth=.8; ctx.beginPath(); ctx.arc(bx,by,6.5,0,Math.PI*2); ctx.stroke();
      for(let i=0;i<5;i++){const a=i*Math.PI*2/5-Math.PI/2;ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx+6.5*Math.cos(a),by+6.5*Math.sin(a));ctx.strokeStyle='rgba(60,60,60,0.6)';ctx.lineWidth=.7;ctx.stroke();}
    }
  },[tactic,animTime,showGhosts,playing]);
  return <canvas ref={ref} style={{position:'absolute',top:0,left:0,width:FW,height:FH,pointerEvents:'none'}}/>;
}

// ═══════════════════════════════════════════
// DRAWING CANVAS (smooth bezier)
// ═══════════════════════════════════════════
const DrawingCanvas = forwardRef(function DrawingCanvas({activeTool,drawColor,lineThickness,onTextPlace,onBeforeStroke},ref){
  const isDrawing=useRef(false),startPos=useRef(null),lastPos=useRef(null);
  const snap=useRef(null),points=useRef([]);

  useEffect(()=>{
    const c=ref.current; if(!c) return;
    const dpr=Math.min(window.devicePixelRatio||1,2);
    c.width=FW*dpr; c.height=FH*dpr;
    c.getContext('2d').scale(dpr,dpr);
  },[]);

  const gp = useCallback((e,c)=>{
    const r=c.getBoundingClientRect();
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    return {x:cx-r.left,y:cy-r.top};
  },[]);

  const arrow = useCallback((ctx,f,t,col,thick)=>{
    const ang=Math.atan2(t.y-f.y,t.x-f.x),sz=thick*4,av=.44;
    ctx.fillStyle=col; ctx.beginPath(); ctx.moveTo(t.x,t.y);
    ctx.lineTo(t.x-sz*Math.cos(ang-av),t.y-sz*Math.sin(ang-av));
    ctx.lineTo(t.x-sz*Math.cos(ang+av),t.y-sz*Math.sin(ang+av));
    ctx.closePath(); ctx.fill();
  },[]);

  const onDown=useCallback((e)=>{
    if(activeTool==='select') return;
    if(activeTool==='text'){onTextPlace&&onTextPlace(gp(e,ref.current));return;}
    e.preventDefault();
    const c=ref.current,ctx=c.getContext('2d'),pos=gp(e,c);
    onBeforeStroke&&onBeforeStroke();
    isDrawing.current=true; startPos.current=pos; lastPos.current=pos; points.current=[pos];
    if(['arrow','line','circle'].includes(activeTool)){
      snap.current=ctx.getImageData(0,0,c.width,c.height);
    }
  },[activeTool,onTextPlace,onBeforeStroke,gp]);

  const onMove=useCallback((e)=>{
    if(!isDrawing.current||activeTool==='select') return;
    e.preventDefault();
    const c=ref.current,ctx=c.getContext('2d'),pos=gp(e,c);
    ctx.lineCap='round'; ctx.lineJoin='round';
    if(activeTool==='pencil'){
      // Smooth bezier drawing
      points.current.push(pos);
      const pts=points.current;
      if(pts.length>=3){
        const l=pts.length;
        const mid1={x:(pts[l-3].x+pts[l-2].x)/2,y:(pts[l-3].y+pts[l-2].y)/2};
        const mid2={x:(pts[l-2].x+pts[l-1].x)/2,y:(pts[l-2].y+pts[l-1].y)/2};
        ctx.globalCompositeOperation='source-over';
        ctx.strokeStyle=drawColor; ctx.lineWidth=lineThickness;
        ctx.beginPath(); ctx.moveTo(mid1.x,mid1.y);
        ctx.quadraticCurveTo(pts[l-2].x,pts[l-2].y,mid2.x,mid2.y); ctx.stroke();
      } else {
        ctx.globalCompositeOperation='source-over';
        ctx.strokeStyle=drawColor; ctx.lineWidth=lineThickness;
        ctx.beginPath(); ctx.moveTo(lastPos.current.x,lastPos.current.y); ctx.lineTo(pos.x,pos.y); ctx.stroke();
      }
      lastPos.current=pos;
    }
    if(activeTool==='eraser'){
      ctx.globalCompositeOperation='destination-out'; ctx.lineWidth=32;
      ctx.beginPath(); ctx.moveTo(lastPos.current.x,lastPos.current.y); ctx.lineTo(pos.x,pos.y); ctx.stroke();
      ctx.globalCompositeOperation='source-over'; lastPos.current=pos;
    }
    if(activeTool==='arrow'||activeTool==='line'){
      ctx.putImageData(snap.current,0,0);
      const s=startPos.current;
      ctx.globalCompositeOperation='source-over'; ctx.strokeStyle=drawColor; ctx.lineWidth=lineThickness; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(pos.x,pos.y); ctx.stroke();
      if(activeTool==='arrow'&&Math.hypot(pos.x-s.x,pos.y-s.y)>12) arrow(ctx,s,pos,drawColor,lineThickness);
    }
    if(activeTool==='circle'){
      ctx.putImageData(snap.current,0,0);
      const s=startPos.current;
      const rx=Math.abs(pos.x-s.x)/2,ry=Math.abs(pos.y-s.y)/2;
      ctx.globalCompositeOperation='source-over'; ctx.strokeStyle=drawColor; ctx.lineWidth=lineThickness;
      ctx.setLineDash([6,4]);
      ctx.beginPath(); ctx.ellipse((s.x+pos.x)/2,(s.y+pos.y)/2,Math.max(rx,1),Math.max(ry,1),0,0,Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
    }
  },[activeTool,drawColor,lineThickness,gp,arrow]);

  const onUp=useCallback(()=>{
    isDrawing.current=false; points.current=[];
    const c=ref.current; if(!c) return;
    const ctx=c.getContext('2d');
    ctx.globalCompositeOperation='source-over'; ctx.setLineDash([]);
  },[]);

  return <canvas ref={ref} style={{position:'absolute',top:0,left:0,width:FW,height:FH,
    cursor:activeTool==='eraser'?'cell':activeTool==='text'?'text':activeTool==='select'?'default':'crosshair',
    pointerEvents:(activeTool==='select'||activeTool==='assign')?'none':'all',touchAction:'none'}}
    onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerLeave={onUp}/>;
});

// ASSIGNMENT OVERLAY
// ═══════════════════════════════════════════
function AssignmentOverlay({assignments, players, oppPlayers, ballPos, preview}){
  const byKey={};
  players.forEach(p=>byKey[`p${p.id}`]={x:p.x*FW,y:p.y*FH});
  oppPlayers.forEach(p=>byKey[p.id]={x:p.x*FW,y:p.y*FH});
  if(ballPos) byKey['ball']={x:ballPos.x*FW,y:ballPos.y*FH};
  function Arrow({fx,fy,tx,ty,col,isBall,opacity=1}){
    const ang=Math.atan2(ty-fy,tx-fx),sz=11,av=0.44;
    return(
      <g opacity={opacity}>
        <line x1={fx} y1={fy} x2={tx} y2={ty} stroke={col} strokeWidth={2.2} strokeDasharray="6 4"/>
        <polygon points={`${tx},${ty} ${tx-sz*Math.cos(ang-av)},${ty-sz*Math.sin(ang-av)} ${tx-sz*Math.cos(ang+av)},${ty-sz*Math.sin(ang+av)}`} fill={col}/>
        {isBall
          ? <circle cx={fx} cy={fy} r={6} fill="rgba(255,255,255,0.15)" stroke={col} strokeWidth={1.5}/>
          : <circle cx={fx} cy={fy} r={5} fill="none" stroke={col} strokeWidth={1.5} strokeDasharray="2 2"/>
        }
      </g>
    );
  }
  function arrowCol(key){ return key==='ball'?'#fff':key.startsWith('o')?'#4a90ff':'#ffd700'; }
  return(
    <svg style={{position:'absolute',top:0,left:0,width:FW,height:FH,pointerEvents:'none',zIndex:15}} viewBox={`0 0 ${FW} ${FH}`}>
      {Object.entries(assignments).map(([key,dest])=>{
        const from=byKey[key]; if(!from) return null;
        return <Arrow key={key} fx={from.x} fy={from.y} tx={dest.x*FW} ty={dest.y*FH} col={arrowCol(key)} isBall={key==='ball'}/>;
      })}
      {preview&&(()=>{
        const col=arrowCol(preview.playerId);
        return <Arrow fx={preview.fromX} fy={preview.fromY} tx={preview.toX} ty={preview.toY} col={col} isBall={preview.playerId==='ball'} opacity={0.55}/>;
      })()}
    </svg>
  );
}

// ═══════════════════════════════════════════
// MAIN iPad APP
// ═══════════════════════════════════════════
function TacticalBoardIPad(){
  const [tweaks,setTweaks]=useState(TWEAK_DEFAULTS);
  const [formation,setFormation]=useState(11);
  const [players,setPlayers]=useState(getInitial(11));
  const [activeTool,setActiveTool]=useState('pencil');
  const [drawColor,setDrawColor]=useState('#ffffff');
  const [colorIdx,setColorIdx]=useState(0);
  const COLORS=['#ffffff','#ffd700','#ff4466','#00e5cc','#ff9f43'];

  const [selectedTactic,setSelTactic]=useState(null);
  const [animPlaying,setAnimPlaying]=useState(false);
  const [animTime,setAnimTime]=useState(0);
  const [animPos,setAnimPos]=useState(null);
  const [textInput,setTextInput]=useState(null);
  const [oppPlayers,setOppPlayers]=useState([...OPP_BY_FORMATION[11]]);
  const [ballPos,setBallPos]=useState({x:.50,y:.50});
  const [assignments,setAssignments]=useState({});
  const [assignPreview,setAssignPreview]=useState(null);
  const [assignPlaying,setAssignPlaying]=useState(false);

  const drawRef=useRef(null);
  const undoStack=useRef([]);
  const animStart=useRef(null),animFrame=useRef(null);
  const dragging=useRef(null),fieldRef=useRef(null);
  const assignAnimRef=useRef(null),assignStartRef=useRef(null),assignStartPos=useRef(null);

  // Formation
  function changeFormation(fk){
    setFormation(fk); setPlayers(getInitial(fk));
    setOppPlayers([...OPP_BY_FORMATION[fk]]);
    setAssignments({}); setAssignPreview(null);
    setBallPos({x:.50,y:.50});
    stopAnim(); setSelTactic(null);
  }

  // Tactic
  function selectTactic(t){
    stopAnim();
    if(selectedTactic?.id===t.id){setSelTactic(null);setAnimTime(0);setAnimPos(null);return;}
    setFormation(t.formationKey); setPlayers(getInitial(t.formationKey));
    setOppPlayers([...OPP_BY_FORMATION[t.formationKey]]);
    if(t.ballStart) setBallPos({...t.ballStart});
    setSelTactic(t); setAnimTime(0); setAnimPos(null);
  }

  function startAnim(){
    if(!selectedTactic) return;
    stopAnim(); setAnimTime(0); setAnimPos(null);
    animStart.current=performance.now(); setAnimPlaying(true);
    function tick(now){
      const t=Math.min((now-animStart.current)/1000,selectedTactic.duration);
      setAnimTime(t);
      const pos={};
      Object.entries(selectedTactic.movements).forEach(([id,kfs])=>{pos[+id]=ipos(kfs,t);});
      setAnimPos(pos);
      if(t<selectedTactic.duration) animFrame.current=requestAnimationFrame(tick);
      else setAnimPlaying(false);
    }
    animFrame.current=requestAnimationFrame(tick);
  }
  function stopAnim(){ if(animFrame.current) cancelAnimationFrame(animFrame.current); setAnimPlaying(false); }
  function togglePlay(){ if(animPlaying){stopAnim();}else{setAnimTime(0);setAnimPos(null);startAnim();} }
  function replayAnim(){ stopAnim(); setAnimTime(0); setAnimPos(null); setTimeout(startAnim,50); }

  // Display players
  const dispPlayers=useMemo(()=>{
    if(!animPos) return players;
    return players.map(p=>{const a=animPos[p.id];return a?{...p,x:a.x,y:a.y}:p;});
  },[players,animPos]);

  // Drag (team + opponent + ball)
  function onDragStart(e,id,isOpp){
    e.preventDefault(); e.stopPropagation();
    dragging.current={id,isOpp:!!isOpp,isBall:false};
    window.addEventListener('pointermove',onDragMove);
    window.addEventListener('pointerup',onDragEnd);
  }
  function onBallDragStart(e){
    e.preventDefault(); e.stopPropagation();
    dragging.current={id:'ball',isOpp:false,isBall:true};
    window.addEventListener('pointermove',onDragMove);
    window.addEventListener('pointerup',onDragEnd);
  }
  function onDragMove(e){
    if(!dragging.current||!fieldRef.current) return;
    const r=fieldRef.current.getBoundingClientRect();
    const x=Math.max(0,Math.min(1,(e.clientX-r.left)/FW));
    const y=Math.max(0,Math.min(1,(e.clientY-r.top)/FH));
    const {id,isOpp,isBall}=dragging.current;
    if(isBall){ setBallPos({x,y}); }
    else if(isOpp) setOppPlayers(p=>p.map(pl=>pl.id===id?{...pl,x,y}:pl));
    else{
      setPlayers(p=>p.map(pl=>pl.id===id?{...pl,x,y}:pl));
      if(animPos) setAnimPos(p=>({...p,[id]:{x,y}}));
    }
  }
  function onDragEnd(){ dragging.current=null; window.removeEventListener('pointermove',onDragMove); window.removeEventListener('pointerup',onDragEnd); }

  // Assign tool
  const ASSIGN_DUR=1.5;
  function findNearestPlayer(cx,cy,radius=22){
    if(Math.hypot(cx-ballPos.x*FW,cy-ballPos.y*FH)<=radius)
      return {key:'ball',px:ballPos.x*FW,py:ballPos.y*FH};
    for(const p of dispPlayers){
      if(Math.hypot(cx-p.x*FW,cy-p.y*FH)<=radius) return {key:`p${p.id}`,px:p.x*FW,py:p.y*FH};
    }
    if(tweaks.showOpponent){
      for(const p of oppPlayers){
        if(Math.hypot(cx-p.x*FW,cy-p.y*FH)<=radius) return {key:p.id,px:p.x*FW,py:p.y*FH};
      }
    }
    return null;
  }
  function onAssignDown(e){
    if(activeTool!=='assign') return;
    const r=fieldRef.current.getBoundingClientRect();
    const cx=e.clientX-r.left,cy=e.clientY-r.top;
    const found=findNearestPlayer(cx,cy);
    if(found) setAssignPreview({playerId:found.key,fromX:found.px,fromY:found.py,toX:cx,toY:cy});
  }
  function onAssignMove(e){
    if(!assignPreview||activeTool!=='assign') return;
    const r=fieldRef.current.getBoundingClientRect();
    setAssignPreview(p=>p?{...p,toX:e.clientX-r.left,toY:e.clientY-r.top}:null);
  }
  function onAssignUp(){
    if(!assignPreview) return;
    const {playerId,fromX,fromY,toX,toY}=assignPreview;
    if(Math.hypot(toX-fromX,toY-fromY)>12){
      setAssignments(prev=>({...prev,[playerId]:{x:toX/FW,y:toY/FH}}));
    }
    setAssignPreview(null);
  }
  function stopAssignAnim(){ if(assignAnimRef.current) cancelAnimationFrame(assignAnimRef.current); setAssignPlaying(false); }
  function playAssignments(){
    if(!Object.keys(assignments).length) return;
    stopAssignAnim();
    const sp={};
    dispPlayers.forEach(p=>{ sp[`p${p.id}`]={x:p.x,y:p.y}; });
    oppPlayers.forEach(p=>{ sp[p.id]={x:p.x,y:p.y}; });
    sp['ball']={x:ballPos.x,y:ballPos.y};
    assignStartPos.current=sp;
    assignStartRef.current=performance.now();
    setAssignPlaying(true);
    function tick(now){
      const t=Math.min((now-assignStartRef.current)/1000,ASSIGN_DUR);
      const prog=eio(t/ASSIGN_DUR);
      const sp=assignStartPos.current;
      setPlayers(prev=>prev.map(p=>{
        const dest=assignments[`p${p.id}`]; if(!dest) return p;
        const s=sp[`p${p.id}`];
        return{...p,x:lerp(s.x,dest.x,prog),y:lerp(s.y,dest.y,prog)};
      }));
      setOppPlayers(prev=>prev.map(p=>{
        const dest=assignments[p.id]; if(!dest) return p;
        const s=sp[p.id];
        return{...p,x:lerp(s.x,dest.x,prog),y:lerp(s.y,dest.y,prog)};
      }));
      if(assignments['ball']){
        const dest=assignments['ball'],s=sp['ball'];
        setBallPos({x:lerp(s.x,dest.x,prog),y:lerp(s.y,dest.y,prog)});
      }
      if(t<ASSIGN_DUR) assignAnimRef.current=requestAnimationFrame(tick);
      else{ setAssignPlaying(false); setAssignments({}); setAnimPos(null); }
    }
    assignAnimRef.current=requestAnimationFrame(tick);
  }

  // Drawing
  function saveUndo(){
    const c=drawRef.current; if(!c) return;
    undoStack.current.push(c.getContext('2d').getImageData(0,0,c.width,c.height));
    if(undoStack.current.length>15) undoStack.current.shift();
  }
  function undo(){ if(!undoStack.current.length) return; const c=drawRef.current; if(!c) return; c.getContext('2d').putImageData(undoStack.current.pop(),0,0); }
  function clearCanvas(){ saveUndo(); const c=drawRef.current; if(!c) return; c.getContext('2d').clearRect(0,0,c.width,c.height); }

  function handleTextPlace(pos){ setTextInput({x:pos.x,y:pos.y,value:''}); }
  function commitText(){
    if(!textInput) return;
    if(textInput.value.trim()){
      saveUndo();
      const c=drawRef.current; if(!c) return;
      const ctx=c.getContext('2d');
      ctx.font=`bold 14px -apple-system,system-ui`; ctx.fillStyle=drawColor; ctx.textBaseline='top';
      ctx.fillText(textInput.value,textInput.x,textInput.y);
    }
    setTextInput(null);
  }

  const pct=selectedTactic?(animTime/selectedTactic.duration)*100:0;
  const toolColor=tweaks.teamColor;

  const toolBtn=(id,Icon,label)=>(
    <div key={id} onClick={()=>setActiveTool(id)} style={{
      width:52,height:52,borderRadius:13,display:'flex',flexDirection:'column',alignItems:'center',
      justifyContent:'center',gap:3,cursor:'pointer',transition:'all .15s',
      background:activeTool===id?`rgba(${hRgb(toolColor)},0.2)`:'rgba(255,255,255,0.05)',
      border:`1px solid ${activeTool===id?toolColor:'transparent'}`,
      boxShadow:activeTool===id?`0 0 12px rgba(${hRgb(toolColor)},0.25)`:'none',
    }}>
      <div style={{color:activeTool===id?toolColor:'rgba(255,255,255,0.55)'}}><Icon/></div>
      <span style={{fontSize:8,color:activeTool===id?toolColor:'rgba(255,255,255,0.35)',fontFamily:'-apple-system'}}>{label}</span>
    </div>
  );

  return(
    <div style={{
      width:PAD_W,height:PAD_H,borderRadius:22,overflow:'hidden',position:'relative',
      background:'#0c0e1a',
      boxShadow:'0 60px 120px rgba(0,0,0,0.35), 0 0 0 1.5px rgba(255,255,255,0.08), inset 0 1px 0 rgba(255,255,255,0.06)',
      fontFamily:'-apple-system,system-ui,sans-serif',
    }}>
      {/* Camera */}
      <div style={{position:'absolute',top:18,left:'50%',transform:'translateX(-50%)',width:8,height:8,borderRadius:'50%',background:'#1c1c1c',border:'1px solid #2a2a2a',zIndex:50}}/>
      {/* Home indicator */}
      <div style={{position:'absolute',bottom:8,left:'50%',transform:'translateX(-50%)',width:130,height:5,borderRadius:2.5,background:'rgba(255,255,255,0.55)',zIndex:50,pointerEvents:'none'}}/>

      <IPadStatus/>

      {/* ── HEADER ── */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'6px 20px 10px',height:58}}>
        {/* Logo + Title */}
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:36,height:36,borderRadius:10,background:'linear-gradient(135deg,#1a5530,#0d3020)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 2px 10px rgba(0,0,0,0.4)'}}>
            <span style={{fontSize:18}}>⚽</span>
          </div>
          <div>
            <div style={{fontSize:17,fontWeight:700,color:'#fff',letterSpacing:.2}}>戰術板</div>
            <div style={{fontSize:10,color:'rgba(255,255,255,0.35)'}}>iPad HD — {FORMATIONS[formation].name} {FORMATIONS[formation].shape}</div>
          </div>
        </div>
        {/* Formation pills */}
        <div style={{display:'flex',gap:6}}>
          {[6,8,10,11].map(fk=>(
            <button key={fk} onClick={()=>changeFormation(fk)} style={{
              height:34,width:64,borderRadius:10,border:'none',cursor:'pointer',
              fontSize:13,fontWeight:600,fontFamily:'-apple-system',transition:'all .2s',
              background:formation===fk?toolColor:'rgba(255,255,255,0.08)',
              color:formation===fk?'#fff':'rgba(255,255,255,0.5)',
              boxShadow:formation===fk?`0 2px 10px rgba(${hRgb(toolColor)},0.3)`:'none',
            }}>{fk}人制</button>
          ))}
        </div>
        {/* Actions */}
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {Object.keys(assignments).length>0&&(
            <>
              <button onClick={playAssignments} disabled={assignPlaying} style={{height:36,padding:'0 12px',borderRadius:9,border:'none',cursor:'pointer',
                background:assignPlaying?'rgba(255,255,255,0.06)':'#00c853',color:'#fff',fontSize:12,fontWeight:700,fontFamily:'-apple-system',
                display:'flex',alignItems:'center',gap:5,opacity:assignPlaying?.6:1}}>
                <IPlay/>{assignPlaying?'播放中':'播放指定'}
              </button>
              <button onClick={()=>setAssignments({})} title="清除指定" style={{width:36,height:36,borderRadius:9,border:'1px solid rgba(255,100,100,0.3)',background:'rgba(255,60,60,0.1)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'rgba(255,120,120,0.7)'}}>
                <ITrash/>
              </button>
            </>
          )}
          <button onClick={undo} title="復原" style={{width:36,height:36,borderRadius:9,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.06)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'rgba(255,255,255,0.5)'}}>
            <IUndo/>
          </button>
          <button onClick={clearCanvas} title="清除畫線" style={{width:36,height:36,borderRadius:9,border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.06)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'rgba(255,255,255,0.4)'}}>
            <ITrash/>
          </button>
        </div>
      </div>

      {/* ── MAIN 3-COL LAYOUT ── */}
      <div style={{display:'flex',gap:0,flex:1,padding:'0 16px',height:FH+20,alignItems:'flex-start'}}>

        {/* LEFT TOOLBAR */}
        <div style={{width:62,flexShrink:0,display:'flex',flexDirection:'column',alignItems:'center',gap:4,paddingTop:4,paddingRight:6}}>
          {toolBtn('select',ICursor,'選擇')}
          {toolBtn('assign',IAssign,'指定跑位')}
          {toolBtn('pencil',IPencil,'畫筆')}
          {toolBtn('arrow', IArrow,'箭頭')}
          {toolBtn('line',  ILine,'直線')}
          {toolBtn('circle',ICircle,'圓形')}
          {toolBtn('text',  IText,'文字')}
          {toolBtn('eraser',IEraser,'橡皮')}

          <div style={{width:44,height:1,background:'rgba(255,255,255,0.1)',margin:'4px 0'}}/>

          {/* Color wheel */}
          <div style={{width:52,display:'flex',flexWrap:'wrap',gap:4,justifyContent:'center',paddingTop:2}}>
            {COLORS.map((c,i)=>(
              <div key={c} onClick={()=>{setColorIdx(i);setDrawColor(c);}}
                style={{width:18,height:18,borderRadius:'50%',background:c,cursor:'pointer',
                  border:`2px solid ${colorIdx===i?'#fff':'transparent'}`,transition:'all .15s',
                  boxShadow:colorIdx===i?'0 0 6px rgba(255,255,255,0.5)':'none'}}/>
            ))}
          </div>

          <div style={{width:44,height:1,background:'rgba(255,255,255,0.1)',margin:'4px 0'}}/>

          {/* Toggle formation lines */}
          <div onClick={()=>setTweaks(t=>({...t,showFormationLines:!t.showFormationLines}))}
            style={{width:52,height:52,borderRadius:13,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3,cursor:'pointer',
              background:tweaks.showFormationLines?`rgba(${hRgb(toolColor)},0.2)`:'rgba(255,255,255,0.05)',
              border:`1px solid ${tweaks.showFormationLines?toolColor:'transparent'}`,
            }}>
            <div style={{color:tweaks.showFormationLines?toolColor:'rgba(255,255,255,0.4)'}}><ILines/></div>
            <span style={{fontSize:7.5,color:tweaks.showFormationLines?toolColor:'rgba(255,255,255,0.3)',textAlign:'center',lineHeight:1.2}}>陣型線</span>
          </div>

          {/* Toggle opponent */}
          <div onClick={()=>setTweaks(t=>({...t,showOpponent:!t.showOpponent}))}
            style={{width:52,height:52,borderRadius:13,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3,cursor:'pointer',
              background:tweaks.showOpponent?'rgba(74,144,255,0.2)':'rgba(255,255,255,0.05)',
              border:`1px solid ${tweaks.showOpponent?'#4a90ff':'transparent'}`,
            }}>
            <div style={{color:tweaks.showOpponent?'#4a90ff':'rgba(255,255,255,0.4)'}}><IOppo/></div>
            <span style={{fontSize:7.5,color:tweaks.showOpponent?'#4a90ff':'rgba(255,255,255,0.3)',textAlign:'center',lineHeight:1.2}}>對手</span>
          </div>
        </div>

        {/* CENTER: FIELD */}
        <div style={{flex:1,display:'flex',justifyContent:'center',alignItems:'flex-start',paddingTop:4}}>
          <div ref={fieldRef}
            onPointerDown={onAssignDown} onPointerMove={onAssignMove} onPointerUp={onAssignUp} onPointerLeave={onAssignUp}
            style={{position:'relative',width:FW,height:FH,borderRadius:8,overflow:'hidden',
            boxShadow:'0 8px 40px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.06)',flexShrink:0,
            cursor:activeTool==='assign'?'crosshair':'default'}}>
            <FootballField fieldStyle={tweaks.fieldStyle}/>
            <FormationLines players={dispPlayers} formation={formation} teamColor={toolColor} show={tweaks.showFormationLines}/>
            <TacticCanvas tactic={selectedTactic} animTime={animTime} showGhosts={true} playing={animPlaying}/>
            <DrawingCanvas ref={drawRef} activeTool={activeTool} drawColor={drawColor} lineThickness={tweaks.lineThickness} onTextPlace={handleTextPlace} onBeforeStroke={saveUndo}/>
            <AssignmentOverlay assignments={assignments} players={dispPlayers} oppPlayers={oppPlayers} ballPos={ballPos} preview={assignPreview}/>
            {!animPlaying&&<BallDot pos={ballPos} activeTool={activeTool} onBallDragStart={onBallDragStart} hasAssign={!!assignments['ball']}/>}
            {/* Opponent dots */}
            {tweaks.showOpponent && oppPlayers.map(p=>(
              <PlayerDot key={p.id} player={p} teamColor="#4a90ff" showLabel={tweaks.showLabels} activeTool={activeTool} onDragStart={(e,id)=>onDragStart(e,id,true)} isAnim={assignPlaying} isOpp={true} hasAssign={!!assignments[p.id]}/>
            ))}
            {/* My team dots */}
            {dispPlayers.map(p=>(
              <PlayerDot key={p.id} player={p} teamColor={toolColor} showLabel={tweaks.showLabels} activeTool={activeTool} onDragStart={(e,id)=>onDragStart(e,id,false)} isAnim={animPlaying||assignPlaying} isOpp={false} hasAssign={!!assignments[`p${p.id}`]}/>
            ))}
            {textInput&&(
              <div style={{position:'absolute',left:textInput.x,top:textInput.y,zIndex:200}}>
                <input autoFocus value={textInput.value}
                  onChange={e=>setTextInput(t=>({...t,value:e.target.value}))}
                  onKeyDown={e=>{if(e.key==='Enter')commitText();if(e.key==='Escape')setTextInput(null);}}
                  onBlur={commitText}
                  style={{background:'rgba(0,0,0,0.8)',border:`1.5px solid ${drawColor}`,borderRadius:5,
                    color:drawColor,fontSize:14,fontWeight:700,padding:'3px 8px',
                    fontFamily:'-apple-system,system-ui',minWidth:60,maxWidth:160}}/>
              </div>
            )}
          </div>
        </div>

        {/* RIGHT PANEL: TACTICS */}
        <div style={{width:168,flexShrink:0,paddingTop:4,paddingLeft:8,display:'flex',flexDirection:'column',gap:8,height:FH}}>
          <div style={{fontSize:10,fontWeight:700,color:'rgba(255,255,255,0.35)',letterSpacing:1.2,paddingLeft:4}}>預設戰術</div>

          <div style={{display:'flex',flexDirection:'column',gap:6,flex:1,overflowY:'auto'}}>
            {TACTICS.map(t=>{
              const isSel=selectedTactic?.id===t.id;
              return(
                <div key={t.id} onClick={()=>selectTactic(t)} style={{
                  borderRadius:12,border:`1px solid ${isSel?toolColor:'rgba(255,255,255,0.09)'}`,
                  background:isSel?`rgba(${hRgb(toolColor)},0.12)`:'rgba(255,255,255,0.04)',
                  padding:'10px 12px',cursor:'pointer',transition:'all .2s',
                }}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
                    <div style={{display:'flex',alignItems:'center',gap:7}}>
                      <span style={{fontSize:14}}>{t.icon}</span>
                      <span style={{fontSize:12,fontWeight:700,color:isSel?toolColor:'rgba(255,255,255,0.75)'}}>{t.short}</span>
                    </div>
                    {isSel&&(
                      <button onClick={e=>{e.stopPropagation();togglePlay();}} style={{
                        width:26,height:26,borderRadius:'50%',border:'none',cursor:'pointer',
                        background:animPlaying?'rgba(255,255,255,0.12)':toolColor,color:'#fff',
                        display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,
                        boxShadow:animPlaying?'none':`0 2px 8px rgba(${hRgb(toolColor)},0.4)`,
                      }}>
                        {animPlaying?<IStop/>:<IPlay/>}
                      </button>
                    )}
                  </div>
                  <div style={{fontSize:9.5,color:'rgba(255,255,255,0.4)',lineHeight:1.4}}>{t.desc}</div>
                  {isSel&&(
                    <div style={{fontSize:9,color:'rgba(255,255,255,0.28)',lineHeight:1.4,marginTop:4}}>{t.detail}</div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Progress bar + time */}
          <div>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
              <span style={{fontSize:9,color:'rgba(255,255,255,0.3)'}}>進度</span>
              <span style={{fontSize:9,color:'rgba(255,255,255,0.3)'}}>{selectedTactic?`${animTime.toFixed(1)}s / ${selectedTactic.duration}s`:'—'}</span>
            </div>
            <div style={{height:3,background:'rgba(255,255,255,0.08)',borderRadius:1.5,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${pct}%`,background:toolColor,borderRadius:1.5,transition:'width .1s linear'}}/>
            </div>
            {selectedTactic&&(
              <button onClick={replayAnim} style={{marginTop:10,width:'100%',height:34,borderRadius:9,border:`1px solid rgba(${hRgb(toolColor)},0.4)`,background:`rgba(${hRgb(toolColor)},0.1)`,color:toolColor,fontSize:12,fontWeight:600,fontFamily:'-apple-system',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                <IPlay/> 重播
              </button>
            )}
          </div>

          {/* Field style switcher */}
          <div style={{borderTop:'1px solid rgba(255,255,255,0.07)',paddingTop:10}}>
            <div style={{fontSize:9,color:'rgba(255,255,255,0.3)',marginBottom:6}}>球場主題</div>
            <div style={{display:'flex',gap:4}}>
              {[['standard','標準'],['night','夜間'],['minimal','簡約']].map(([v,l])=>(
                <button key={v} onClick={()=>setTweaks(t=>({...t,fieldStyle:v}))}
                  style={{flex:1,height:24,borderRadius:6,border:'none',cursor:'pointer',fontSize:9,fontFamily:'-apple-system',
                    background:tweaks.fieldStyle===v?toolColor:'rgba(255,255,255,0.07)',
                    color:tweaks.fieldStyle===v?'#fff':'rgba(255,255,255,0.4)'}}>
                  {l}
                </button>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* ── BOTTOM BAR ── */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:12,
        padding:'8px 24px 28px',borderTop:'1px solid rgba(255,255,255,0.06)'}}>
        {/* Line thickness */}
        <div style={{display:'flex',gap:5,alignItems:'center'}}>
          <span style={{fontSize:10,color:'rgba(255,255,255,0.3)',marginRight:2}}>筆觸</span>
          {[[1.5,'細'],[2.5,'中'],[4.5,'粗']].map(([v,l])=>(
            <button key={v} onClick={()=>setTweaks(t=>({...t,lineThickness:v}))}
              style={{height:26,padding:'0 10px',borderRadius:7,border:'none',cursor:'pointer',fontSize:10,fontFamily:'-apple-system',
                background:tweaks.lineThickness===v?toolColor:'rgba(255,255,255,0.07)',
                color:tweaks.lineThickness===v?'#fff':'rgba(255,255,255,0.4)'}}>
              {l}
            </button>
          ))}
        </div>
        <div style={{width:1,height:20,background:'rgba(255,255,255,0.1)'}}/>
        {/* Team color */}
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <span style={{fontSize:10,color:'rgba(255,255,255,0.3)',marginRight:2}}>球隊色</span>
          {['#e94560','#4a90ff','#00d68f','#ff9f43','#a855f7'].map(c=>(
            <div key={c} onClick={()=>setTweaks(t=>({...t,teamColor:c}))}
              style={{width:20,height:20,borderRadius:'50%',background:c,cursor:'pointer',
                border:`2.5px solid ${tweaks.teamColor===c?'#fff':'transparent'}`,transition:'all .15s'}}/>
          ))}
        </div>
        <div style={{width:1,height:20,background:'rgba(255,255,255,0.1)'}}/>
        {/* Labels toggle */}
        <div style={{display:'flex',alignItems:'center',gap:7}}>
          <span style={{fontSize:10,color:'rgba(255,255,255,0.3)'}}>位置標籤</span>
          <div onClick={()=>setTweaks(t=>({...t,showLabels:!t.showLabels}))}
            style={{width:36,height:20,borderRadius:10,background:tweaks.showLabels?toolColor:'rgba(255,255,255,0.15)',cursor:'pointer',position:'relative',transition:'background .2s'}}>
            <div style={{position:'absolute',top:2,left:tweaks.showLabels?16:2,width:16,height:16,borderRadius:'50%',background:'#fff',transition:'left .2s'}}/>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<TacticalBoardIPad/>);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));
}
</script>
</body>
</html>
